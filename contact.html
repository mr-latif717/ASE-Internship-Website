<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Allied Software Engineers</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>

    <div class="logo">
        <img src="images/logo.png" alt="Company Logo">
        <h2>Allied Software Engineers</h2>
    </div>

    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="about.html">About</a></li>
            <li><a href="internship.html">Internship</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </nav>

</header>

<section class="welcome">

    <h2>Contact Us</h2>

    <p>
        Fill out the internship registration form below.
    </p>

</section>

<form id="contactForm">

    <label>Full Name</label>
    <input
        type="text"
        id="fullname"
        placeholder="Enter your full name"
    >

    <label>Email</label>
    <input
        type="email"
        id="email"
        placeholder="Enter your email"
    >

    <label>Phone Number</label>
    <input
        type="text"
        id="phone"
        placeholder="03XXXXXXXXX"
    >

    <label>Institute</label>
    <input
        type="text"
        id="institute"
        placeholder="Enter your institute"
    >

    <label>Select Domain</label>
    <select id="domain">
        <option value="">Choose Domain</option>
        <option>Web Development</option>
        <option>DevOps</option>
        <option>Backend Development</option>
    </select>

    <label>Message</label>
    <textarea
        id="message"
        rows="6"
        placeholder="Write your message here..."
    ></textarea>

    <button type="submit">
        Submit
    </button>

</form>

<footer>

    <p>&copy; 2026 Allied Software Engineers | All Rights Reserved.</p>

</footer>

<script src="script.js"></script>

</body>
</html>
